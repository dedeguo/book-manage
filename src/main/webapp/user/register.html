<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 校园图书管理系统</title>
    <style>
        /* 基础样式复位 */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }

        /* 注册卡片 */
        .register-container {
            background: white;
            padding: 45px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            width: 420px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.35);
        }

        .header h2 {
            color: #111827;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .header p {
            color: #9ca3af;
            font-size: 14px;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group label .required {
            color: #ef4444;
            margin-left: 2px;
        }

        .form-input-wrapper {
            position: relative;
        }

        .form-input-wrapper input {
            width: 100%;
            padding: 12px 16px 12px 40px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
            transition: all 0.2s;
            background-color: #f9fafb;
        }

        .form-input-wrapper input:hover {
            border-color: #d1d5db;
        }

        .form-input-wrapper input:focus {
            border-color: #667eea;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-input-wrapper .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            pointer-events: none;
        }

        .form-input-wrapper .input-icon svg {
            width: 18px;
            height: 18px;
        }

        /* 密码强度提示 */
        .password-tip {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 6px;
        }

        .password-strength {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .strength-bar {
            flex: 1;
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            transition: all 0.3s;
        }

        .strength-bar.weak { background: #ef4444; }
        .strength-bar.medium { background: #f59e0b; }
        .strength-bar.strong { background: #10b981; }

        /* 密码显示切换 */
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:hover {
            color: #6b7280;
        }

        .password-toggle svg {
            width: 18px;
            height: 18px;
        }

        /* 协议勾选 */
        .agreement-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 20px 0;
            font-size: 13px;
        }

        .agreement-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .agreement-group label {
            color: #6b7280;
            cursor: pointer;
            line-height: 1.5;
        }

        .agreement-group a {
            color: #667eea;
            text-decoration: none;
        }

        .agreement-group a:hover {
            text-decoration: underline;
        }

        /* 注册按钮 */
        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 14px rgba(102, 126, 234, 0.35);
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.45);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        /* 底部链接 */
        .footer-links {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #6b7280;
        }

        .footer-links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* 错误提示 */
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .error-message p {
            font-size: 13px;
            color: #dc2626;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 成功提示 */
        .success-message {
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .success-message p {
            font-size: 13px;
            color: #059669;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .register-container {
                width: 90%;
                padding: 35px 25px;
            }
        }
    </style>
</head>
<body>

<div class="register-container">
    <div class="header">
        <div class="header-icon">📚</div>
        <h2>创建新账号</h2>
        <p>填写下方信息完成注册</p>
    </div>

    <!-- 错误提示 -->
    <div class="error-message" id="errorMessage">
        <p>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span id="errorText">错误信息</span>
        </p>
    </div>

    <!-- 成功提示 -->
    <div class="success-message" id="successMessage">
        <p>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span>注册成功！即将跳转登录页...</span>
        </p>
    </div>

    <form action="/api/register" method="POST" id="registerForm">
        <div class="form-group">
            <label>学号/工号 <span class="required">*</span></label>
            <div class="form-input-wrapper">
                <span class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2" />
                    </svg>
                </span>
                <input type="text" name="username" id="username" placeholder="请输入学号或教工号" required autocomplete="username">
            </div>
        </div>

        <div class="form-group">
            <label>姓名 <span class="required">*</span></label>
            <div class="form-input-wrapper">
                <span class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </span>
                <input type="text" name="name" id="name" placeholder="请输入真实姓名" required autocomplete="name">
            </div>
        </div>

        <div class="form-group">
            <label>电子邮箱 <span class="required">*</span></label>
            <div class="form-input-wrapper">
                <span class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                </span>
                <input type="email" name="email" id="email" placeholder="example@wbu.edu.cn" required autocomplete="email">
            </div>
        </div>

        <div class="form-group">
            <label>设置密码 <span class="required">*</span></label>
            <div class="form-input-wrapper">
                <span class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </span>
                <input type="password" name="password" id="password" placeholder="6-18 位字母数字组合" required minlength="6" maxlength="18" autocomplete="new-password">
                <button type="button" class="password-toggle" onclick="togglePassword('password')" title="显示/隐藏密码">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" id="eyeIcon1">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </button>
            </div>
            <div class="password-tip">6-18 位字母数字组合</div>
            <div class="password-strength" id="passwordStrength">
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
            </div>
        </div>

        <div class="form-group">
            <label>确认密码 <span class="required">*</span></label>
            <div class="form-input-wrapper">
                <span class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </span>
                <input type="password" name="confirm_password" id="confirmPassword" placeholder="请再次输入密码" required autocomplete="new-password">
                <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')" title="显示/隐藏密码">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" id="eyeIcon2">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="agreement-group">
            <input type="checkbox" id="agreement" required>
            <label for="agreement">我已阅读并同意 <a href="#">《用户服务协议》</a></label>
        </div>

        <button type="submit" class="btn-register">立即注册</button>
    </form>

    <div class="footer-links">
        已有账号？<a href="login.html">立即登录</a>
    </div>
</div>

<script src="../js/common.js"></script>
<script>
    // 密码显示/隐藏切换
    function togglePassword(inputId) {
        const passwordInput = document.getElementById(inputId);
        const eyeIcon = inputId === 'password' ? document.getElementById('eyeIcon1') : document.getElementById('eyeIcon2');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.innerHTML = `
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
            `;
        } else {
            passwordInput.type = 'password';
            eyeIcon.innerHTML = `
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            `;
        }
    }

    // 页面加载时检查是否已登录
    window.addEventListener('DOMContentLoaded', function() {
        if (Auth.isLoggedIn()) {
            Auth.redirectToHome();
        }
    });

    // 密码强度检测
    document.getElementById('password').addEventListener('input', function(e) {
        const password = e.target.value;
        const bars = document.querySelectorAll('.strength-bar');
        let strength = 0;

        if (password.length >= 6) strength++;
        if (password.length >= 10 && /[A-Za-z]/.test(password) && /[0-9]/.test(password)) strength++;
        if (password.length >= 12 && /[A-Za-z]/.test(password) && /[0-9]/.test(password) && /[^A-Za-z0-9]/.test(password)) strength++;

        bars.forEach((bar, index) => {
            if (index < strength) {
                if (strength === 1) bar.classList.add('weak');
                else if (strength === 2) bar.classList.add('medium');
                else if (strength === 3) bar.classList.add('strong');
            } else {
                bar.classList.remove('weak', 'medium', 'strong');
            }
        });
    });

    // 表单提交处理
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const agreement = document.getElementById('agreement').checked;
        const submitBtn = this.querySelector('[type="submit"]');

        // 验证密码长度
        if (password.length < 6 || password.length > 18) {
            Utils.toast('密码长度必须在 6-18 位之间', 'error');
            return;
        }

        // 验证密码一致性
        if (password !== confirmPassword) {
            Utils.toast('两次输入的密码不一致', 'error');
            return;
        }

        // 验证协议勾选
        if (!agreement) {
            Utils.toast('请勾选同意用户服务协议', 'error');
            return;
        }

        // 禁用按钮防止重复提交
        submitBtn.disabled = true;
        submitBtn.textContent = '注册中...';

        try {
            const result = await API.post('/auth?action=register', {
                username, name, password, email
            });

            if (result.code === 200) {
                Utils.toast('注册成功', 'success');
                // 延迟跳转
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1000);
            } else {
                Utils.toast(result.message || '注册失败', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '立即注册';
            }
        } catch (error) {
            Utils.toast(error.message || '注册失败，请检查网络连接', 'error');
            submitBtn.disabled = false;
            submitBtn.textContent = '立即注册';
        }
    });
</script>

</body>
</html>
